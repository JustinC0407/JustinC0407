<svg width="1000" height="220" viewBox="0 0 1000 220" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Justin Chen - Software Engineer, ML Systems, Artist">
  <defs>
    <!-- Shimmering green gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#047857">
        <animate attributeName="stop-color" values="#047857;#059669;#047857" dur="7s" repeatCount="indefinite" />
      </stop>
      <stop offset="0.55" stop-color="#34D399">
        <animate attributeName="stop-color" values="#34D399;#10B981;#34D399" dur="7s" repeatCount="indefinite" />
      </stop>
      <stop offset="1" stop-color="#BEF264">
        <animate attributeName="stop-color" values="#BEF264;#A3E635;#BEF264" dur="7s" repeatCount="indefinite" />
      </stop>
    </linearGradient>

    <!-- Soft glow for the title -->
    <filter id="glow" x="-20%" y="-40%" width="140%" height="180%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Moving sheen -->
    <linearGradient id="sheen" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0" />
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.14" />
      <stop offset="1" stop-color="#ffffff" stop-opacity="0" />
    </linearGradient>

    <clipPath id="round">
      <rect x="0" y="0" width="1000" height="220" rx="24" />
    </clipPath>
  </defs>

  <g clip-path="url(#round)">
    <!-- Background -->
    <rect x="0" y="0" width="1000" height="220" fill="url(#bg)" />

    <!-- Floating bubbles -->
    <g fill="#ffffff" opacity="0.10">
      <circle cx="120" cy="180" r="34">
        <animateTransform attributeName="transform" type="translate" values="0 0; 0 -26; 0 0" dur="6s" repeatCount="indefinite" />
        <animate attributeName="opacity" values="0.10;0.18;0.10" dur="6s" repeatCount="indefinite" />
      </circle>
      <circle cx="860" cy="60" r="46">
        <animateTransform attributeName="transform" type="translate" values="0 0; 0 22; 0 0" dur="8s" repeatCount="indefinite" />
        <animate attributeName="opacity" values="0.08;0.16;0.08" dur="8s" repeatCount="indefinite" />
      </circle>
      <circle cx="680" cy="190" r="22">
        <animateTransform attributeName="transform" type="translate" values="0 0; 0 -18; 0 0" dur="5s" repeatCount="indefinite" />
      </circle>
      <circle cx="300" cy="40" r="18">
        <animateTransform attributeName="transform" type="translate" values="0 0; 0 16; 0 0" dur="7s" repeatCount="indefinite" />
      </circle>
      <circle cx="940" cy="170" r="16">
        <animateTransform attributeName="transform" type="translate" values="0 0; 0 -14; 0 0" dur="6.5s" repeatCount="indefinite" />
      </circle>
    </g>

    <!-- Twinkling sparkles -->
    <g fill="#ffffff">
      <path d="M200 70 l4 10 l10 4 l-10 4 l-4 10 l-4 -10 l-10 -4 l10 -4 z">
        <animate attributeName="opacity" values="0.2;1;0.2" dur="2.4s" repeatCount="indefinite" />
      </path>
      <path d="M780 150 l3 8 l8 3 l-8 3 l-3 8 l-3 -8 l-8 -3 l8 -3 z">
        <animate attributeName="opacity" values="1;0.2;1" dur="3s" repeatCount="indefinite" />
      </path>
      <path d="M560 48 l2.5 6 l6 2.5 l-6 2.5 l-2.5 6 l-2.5 -6 l-6 -2.5 l6 -2.5 z">
        <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite" />
      </path>
    </g>

    <!-- Sweeping sheen across the whole header -->
    <rect x="-400" y="0" width="400" height="220" fill="url(#sheen)">
      <animate attributeName="x" values="-400;1000" dur="5s" repeatCount="indefinite" />
    </rect>

    <!-- Title -->
    <g filter="url(#glow)" text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
      <text x="500" y="112" font-size="52" font-weight="800" fill="#ffffff" letter-spacing="1">
        &#10022; Justin Chen &#10022;
        <animate attributeName="opacity" values="0;1" dur="1.2s" fill="freeze" />
      </text>
    </g>
    <text x="500" y="150" text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="18" font-weight="500" fill="#ECFDF5" letter-spacing="2">
      Software Engineer &#183; ML Systems &#183; Artist
      <animate attributeName="opacity" values="0;0;1" dur="2s" fill="freeze" />
    </text>
  </g>
</svg>
